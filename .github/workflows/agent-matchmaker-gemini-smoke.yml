# Run manually: Actions → "Agent Matchmaker Gemini smoke" → Run workflow
# Set repository secret GEMINI_API_KEY; without it, strict match smoke will fail.
name: Agent Matchmaker Gemini smoke

on:
  workflow_dispatch:

jobs:
  match-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            agent-matchmaker/requirements-app.txt
            agent-matchmaker/requirements-qa.txt

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -r agent-matchmaker/requirements-app.txt
          .venv/bin/pip install -r agent-matchmaker/requirements-qa.txt

      - name: Build catalog
        run: python3 scripts/build_agent_matchmaker.py

      - name: Run strict match smoke (HTTP only)
        run: bash ./scripts/qa-reality-capture.sh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MATCH_SMOKE: "1"
          MATCH_SMOKE_STRICT: "1"
          HTTP_ONLY: "1"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-matchmaker-gemini-smoke
          path: agent-matchmaker/qa-screenshots/
